<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PDF To Excel</title>

    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>AI PDF → Excel</h1>

        <p class="subtitle">
            Upload any PDF and convert it into a structured Excel file using AI.
        </p>

        <form
            action="/upload"
            method="post"
            enctype="multipart/form-data"
            id="uploadForm"
        >

            <input
                type="file"
                name="pdf_file"
                accept=".pdf"
                required
            >

            <button type="submit">
                Convert To Excel
            </button>

        </form>

        <div id="loading" class="hidden">
            Processing document...
        </div>

    </div>

</div>

<script src="/static/js/app.js"></script>

</body>
</html>
